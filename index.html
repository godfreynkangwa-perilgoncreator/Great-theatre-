<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Streaming Sites Launcher</title>
<style>
  body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    background-color: #ffffff; /* White background */
    color: #000; /* Dark text for visibility */
  }

  header {
    padding: 20px 40px;
    font-size: 2rem;
    font-weight: bold;
    color: #e50914;
    text-align: center;
    letter-spacing: 2px;
  }

  .site-launcher {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 25px;
    padding: 40px;
  }

  .site-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-decoration: none;
    color: inherit;
    transition: transform 0.3s;
  }

  .site-card img {
    width: 100px;
    height: 100px;
    border-radius: 15px;
    object-fit: cover;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
  }

  .site-card:hover {
    transform: scale(1.1);
  }

  .site-card span {
    margin-top: 8px;
    font-weight: bold;
  }

  footer {
    text-align: center;
    padding: 20px;
    font-size: 0.9rem;
    color: #555;
  }

</style>
</head>
<body>

<header>🌐 Streaming Sites Launcher</header>

<div class="site-launcher">
  <a class="site-card" href="https://www.dailymotion.com" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6f/Dailymotion_logo_2015.png" alt="Dailymotion">
    <span>Dailymotion</span>
  </a>

  <a class="site-card" href="https://www.youtube.com" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg" alt="YouTube">
    <span>YouTube</span>
  </a>

  <a class="site-card" href="https://www.bollyrules.com" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Bollywood_Icon.png" alt="Bolly Rules">
    <span>Bolly Rules</span>
  </a>

  <a class="site-card" href="https://www.netflix.com" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" alt="Netflix">
    <span>Netflix</span>
  </a>

  <a class="site-card" href="https://www.primevideo.com" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/f/f1/Prime_Video.png" alt="Prime Video">
    <span>Prime Video</span>
  </a>
</div>

<footer>© 2026 Streaming Sites Launcher</footer>

</body>
</html>
