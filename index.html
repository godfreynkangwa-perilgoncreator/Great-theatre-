<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Great Theatre</title>
<style>
  body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    background-color: #141414;
    color: #fff;
  }

  header {
    padding: 20px 40px;
    font-size: 2rem;
    font-weight: bold;
    color: #e50914;
    text-align: center;
    letter-spacing: 2px;
    text-shadow: 1px 1px 4px #000;
  }

  .category {
    padding: 20px 40px;
  }

  .category h2 {
    font-size: 1.5rem;
    margin-bottom: 15px;
    color: #fff;
  }

  .video-row {
    display: flex;
    overflow-x: auto;
    gap: 15px;
    scroll-behavior: smooth;
    padding-bottom: 10px;
  }

  .video-card {
    position: relative;
    min-width: 250px;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    flex-shrink: 0;
  }

  .video-card iframe {
    width: 100%;
    height: 140px;
    border: 0;
    transition: transform 0.3s;
  }

  .video-card:hover iframe {
    transform: scale(1.1);
  }

  /* Hover overlay */
  .overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(20, 20, 20, 0.8);
    color: #fff;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .video-card:hover .overlay {
    opacity: 1;
  }

  .overlay h3 {
    margin: 0;
    font-size: 1rem;
    text-align: center;
    padding: 0 5px;
  }

  .play-button {
    margin-top: 10px;
    width: 40px;
    height: 40px;
    background-color: #e50914;
    clip-path: polygon(0% 0%, 100% 50%, 0% 100%);
  }

  footer {
    text-align: center;
    padding: 20px;
    font-size: 0.9rem;
    color: #888;
  }

  /* Scrollbar hide */
  .video-row::-webkit-scrollbar {
    display: none;
  }
</style>
</head>
<body>

<header>🎬 Great Theatre show</header>

<div class="category">
  <h2>Trending</h2>
  <div class="video-row">
    <div class="video-card">
      <iframe src="https://www.youtube.com/embed/aqz-KE-bpKQ" allowfullscreen></iframe>
      <div class="overlay">
        <h3>Big Buck Bunny</h3>
        <div class="play-button"></div>
      </div>
    </div>
    <div class="video-card">
      <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
      <div class="overlay">
        <h3>Never Gonna Give You Up</h3>
        <div class="play-button"></div>
      </div>
    </div>
    <div class="video-card">
      <iframe src="https://www.youtube.com/embed/kJQP7kiw5Fk" allowfullscreen></iframe>
      <div class="overlay">
        <h3>Despacito</h3>
        <div class="play-button"></div>
      </div>
    </div>
  </div>
</div>

<div class="category">
  <h2>Popular</h2>
  <div class="video-row">
    <div class="video-card">
      <iframe src="https://www.youtube.com/embed/3JZ_D3ELwOQ" allowfullscreen></iframe>
      <div class="overlay">
        <h3>Shape of You</h3>
        <div class="play-button"></div>
      </div>
    </div>
    <div class="video-card">
      <iframe src="https://www.youtube.com/embed/L_jWHffIx5E" allowfullscreen></iframe>
      <div class="overlay">
        <h3>Smells Like Teen Spirit</h3>
        <div class="play-button"></div>
      </div>
    </div>
  </div>
</div>

<footer>© 2026  the world of greatness
</footer>

</body>
</html>
